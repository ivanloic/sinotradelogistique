<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo/logochine.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SinoTrade - Importation Directe de Chine</title>
  </head>
  <body>
    <!-- Redirect Moneroo payment result → HashRouter /Confirmation -->
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        if (params.has('paymentId') || params.has('paymentStatus')) {
          window.location.replace('/#/Confirmation' + window.location.search);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
